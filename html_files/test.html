<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HtmlLoader Test Page</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
            padding: 50px;
        }
        .card {
            background-color: #1e293b;
            border-radius: 8px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        h1 {
            color: #38bdf8;
            margin-top: 0;
        }
        p {
            color: #94a3b8;
            font-size: 1.1em;
            line-height: 1.6;
        }
        .status-badge {
            display: inline-block;
            background-color: #10b981;
            color: #0f172a;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 9999px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 HtmlLoader Test Page</h1>
        <p>If you can see this page, it means the <code>HtmlLoader</code> servlet is successfully resolving, loading, and serving static HTML files from the configured directory.</p>
        <span class="status-badge">Loader Status: OK</span>
    </div>
</body>
</html>
